name: Futurecoin (FTC) - Datadog Synthetic Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:

jobs:
  datadog-synthetics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Futurecoin Synthetic Tests
        uses: DataDog/synthetics-ci-github-action@v1.4.0
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}

          # Futurecoin Production Tests
          test_search_query: >
            tag:futurecoin
            tag:fitcoin
            tag:ftc
            tag:wallet
            tag:mining
            tag:production

          fail_on_timeout: true
          fail_on_critical_errors: true
          junit_report: true

      - name: Success
        if: success()
        run: echo "✅ Futurecoin.in Datadog Synthetic Tests Passed"

      - name: Failure
        if: failure()
        run: echo "❌ Futurecoin.in Datadog Synthetic Tests Failed"
